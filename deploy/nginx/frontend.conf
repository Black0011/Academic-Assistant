# Nginx config baked into the frontend image.
#
# Two responsibilities:
#   1. Serve the static SPA (index.html fallback for client-side routing).
#   2. Reverse-proxy /api/ to the `backend` service on the docker network.
#
# The SSE endpoint /api/tasks/.../stream gets a dedicated location with
# buffering disabled and a long read timeout — without those tweaks the
# browser sees events arrive in seconds-long bursts (or not at all when
# nginx times out at the default 60s).

# Allow large manuscript / PDF uploads; backend already enforces its own
# per-endpoint limits.
client_max_body_size 32M;

upstream aaf_backend {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Security baseline (override at the edge for stricter CSP) ------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Static SPA -----------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache the immutable Vite assets aggressively. They have content-
    # hashed filenames so this is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- SSE — long-lived, unbuffered ----------------------------------
    location ~ ^/api/tasks/.+/stream$ {
        proxy_pass         http://aaf_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    # ---- Generic API reverse proxy --------------------------------------
    location /api/ {
        proxy_pass         http://aaf_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
